<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum map "Made in Atlantic"</title>

  <meta property="og:title" content="Curriculum Map – Made in Atlantic">
  <meta property="og:description" content="Interactive map of European universities and joint programmes in the Atlantic macro-region.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maitgonz.github.io/Curriculum-map-Made-in-Atlantic-/">
  <meta property="og:image" content="https://maitgonz.github.io/Curriculum-map-Made-in-Atlantic-/preview.png">
  <meta property="og:image:alt" content="Preview of the Curriculum Map Made in Atlantic interactive map">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Curriculum Map – Made in Atlantic">
  <meta name="twitter:description" content="Interactive map of European universities and joint programmes in the Atlantic macro-region.">
  <meta name="twitter:image" content="https://maitgonz.github.io/Curriculum-map-Made-in-Atlantic-/preview.png">
</head>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
  }

    h1 {
      margin: 0;
      padding: 15px;
      background: white;
      border-bottom: 1px solid #ccc;
      font-size: 20px;
    }

    #controls {
      padding: 12px 15px;
      background: #f8fafc;
      border-bottom: 1px solid #d1d5db;
      font-size: 14px;

      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
    }

    .filter-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .filter-group label {
      font-weight: 600;
      margin: 0;
    }

    .filter-group select {
      padding: 6px 10px;
      font-size: 14px;
    }

    html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  #map {
    flex: 1;
    width: 100%;
    min-height: 0;
  }

    #side-panel {
    position: absolute;
    top: 120px;
    right: 20px;
    bottom: 0;
    width: 320px;
    overflow-y: auto;
    background: white;
    border-left: 1px solid #d1d5db;
    padding: 16px;
    box-shadow: -2px 0 8px rgba(0, 0, 0, 0.08);
    z-index: 1000;
  }

  .hidden {
    display: none;
  }

  #panel-content h3 {
    margin-top: 0;
  }

  #panel-content h2 {
  margin-top: 0;
  margin-bottom: 6px;
  font-size: 22px;
}

    .panel-subtitle {
      margin: 0 0 4px 0;
      color: #475569;
      font-size: 14px;
    }

    .panel-section {
      margin-top: 20px;
    }

    .panel-section h4 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }

    .programme-item {
      margin-bottom: 16px;
    }

    .programme-item p {
      margin: 6px 0;
    }

  #panel-content ul {
    margin-top: 6px;
    padding-left: 20px;
  }
    .alliance-link {
      font-size: 12px;
      font-style: italic;
      text-decoration: none;
    }

    .alliance-link:hover {
      text-decoration: underline;
    }

      #panel-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }

  #side-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 350px;
  height: 100%;
  background: white;
  padding: 15px;
  overflow-y: auto;
  box-shadow: -2px 0 6px rgba(0,0,0,0.1);
}

  .leaflet-interactive:focus {
    outline: none;
  }

  .leaflet-interactive:focus-visible {
    outline: none;
  }

  #alianzaSelect {
    color: black;
  }

    #programaSelect {
    color: black;
  }

  </style>
<body>
  <h1>Curriculum map "Made in Atlantic"</h1>

  <div id="controls">
    <div class="filter-group">
      <label for="alianzaSelect">Filter by alliance:</label>
      <select id="alianzaSelect">
        <option value="todas">All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="programaSelect">Filter by programme:</label>
      <select id="programaSelect">
        <option value="todos">All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="regionSelect">Filter by region:</label>
      <select id="regionSelect">
        <option value="todas">All</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="paisSelect">Filter by country:</label>
      <select id="paisSelect">
        <option value="todos">All</option>
      </select>
    </div>
  </div>

  <div id="map"></div>

  <aside id="side-panel" class="hidden">
  <div id="panel-header">
    <button id="close-panel" aria-label="Close panel">×</button>
  </div>
  <div id="panel-content"></div>
</aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="main.js"></script>
</body>
</html>
